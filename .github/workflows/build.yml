name: Build Terminal-Cast

on:
  workflow_call:
    inputs:
      ref:
        type: string
        default: 'feature/asciicast'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA)'
        default: 'feature/asciicast'
        required: true

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'feature/asciicast' }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
        with:
          nuget-version: '7.x'

      - name: Generate Third-Party Notices
        shell: pwsh
        run: |
          .\build\scripts\Generate-ThirdPartyNotices.ps1 `
            -MarkdownNoticePath .\NOTICE.md `
            -OutputPath .\src\cascadia\CascadiaPackage\NOTICE.html

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path "dep\vcpkg\vcpkg.exe")) {
            if (-not (Test-Path "dep\vcpkg\.git")) {
              git clone https://github.com/microsoft/vcpkg dep/vcpkg
            }
            Push-Location dep\vcpkg
            .\bootstrap-vcpkg.bat
            Pop-Location
          }
          echo "VCPKG_ROOT=${{ github.workspace }}\dep\vcpkg" >> $env:GITHUB_ENV

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          nuget restore build\packages.config -PackagesDirectory packages -ConfigFile NuGet.Config
          nuget restore dep\nuget\packages.config -PackagesDirectory packages -ConfigFile NuGet.Config

      - name: Restore solution
        shell: pwsh
        run: |
          msbuild OpenConsole.slnx /t:Restore /p:Platform=${{ matrix.platform }} /p:Configuration=Release

      - name: Set VC Tools version
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $vcToolsDir = Join-Path $vsPath "VC\Tools\MSVC"
          $latestVersion = Get-ChildItem $vcToolsDir -Directory |
            Sort-Object { [version]$_.Name } -Descending |
            Select-Object -First 1 -ExpandProperty Name
          echo "VCToolsVersion=$latestVersion" >> $env:GITHUB_ENV
          Write-Host "Using VC Tools version: $latestVersion"

      - name: Build Terminal
        shell: pwsh
        run: |
          msbuild OpenConsole.slnx `
            /p:Configuration=Release `
            /p:Platform=${{ matrix.platform }} `
            /p:WindowsTerminalOfficialBuild=false `
            /p:WindowsTerminalBranding=Dev `
            /p:PGOBuildMode=None `
            /m

      - name: Create unpackaged distribution
        id: dist
        shell: pwsh
        run: |
          # Find the built Terminal MSIX
          $terminalAppx = Get-ChildItem -Path . -Recurse -Include "CascadiaPackage*.msix","CascadiaPackage*.appx" |
            Where-Object { $_.FullName -notmatch '\\packages\\' } |
            Select-Object -First 1

          if (-not $terminalAppx) {
            Write-Error "Could not find Terminal AppX/MSIX after build!"
            Write-Host "Searching for any msix/appx files:"
            Get-ChildItem -Path . -Recurse -Include "*.msix","*.appx" | ForEach-Object { Write-Host "  $_" }
            exit 1
          }
          Write-Host "Terminal AppX: $($terminalAppx.FullName)"

          # Find XAML AppX for the target architecture
          $arch = "${{ matrix.platform }}"
          $xamlAppx = Get-ChildItem -Path "packages" -Recurse -Filter "Microsoft.UI.Xaml.*.appx" |
            Where-Object { $_.FullName -match $arch -and $_.FullName -match "Release" } |
            Select-Object -First 1

          if (-not $xamlAppx) {
            Write-Error "Could not find XAML AppX for $arch!"
            Write-Host "Available appx files in packages:"
            Get-ChildItem -Path "packages" -Recurse -Filter "*.appx" | ForEach-Object { Write-Host "  $_" }
            exit 1
          }
          Write-Host "XAML AppX: $($xamlAppx.FullName)"

          # Find MakeAppx.exe from Windows SDK
          $sdkBin = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Directory |
            Where-Object { $_.Name -match '^\d+\.\d+' } |
            Sort-Object { [version]$_.Name } -Descending |
            Select-Object -First 1
          $makeAppx = Join-Path $sdkBin.FullName "x64\MakeAppx.exe"
          Write-Host "MakeAppx: $makeAppx"

          # Create unpackaged distribution
          $outDir = New-Item -ItemType Directory -Path "dist" -Force

          .\build\scripts\New-UnpackagedTerminalDistribution.ps1 `
            -TerminalAppX $terminalAppx.FullName `
            -XamlAppX $xamlAppx.FullName `
            -Destination $outDir.FullName `
            -MakeAppxPath $makeAppx `
            -PortableMode

          # Rename output to Terminal-Cast naming
          $zip = Get-ChildItem $outDir -Filter "*.zip" | Select-Object -First 1
          if (-not $zip) {
            Write-Error "No zip file produced by unpackaged distribution script!"
            Get-ChildItem $outDir -Recurse | ForEach-Object { Write-Host "  $_" }
            exit 1
          }

          $newName = "Terminal-Cast-${{ matrix.platform }}.zip"
          Rename-Item $zip.FullName $newName
          Write-Host "Output: $newName"
          echo "zip_name=$newName" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Terminal-Cast-${{ matrix.platform }}
          path: dist/Terminal-Cast-${{ matrix.platform }}.zip
          retention-days: 30
